name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests if available
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          if [ ! -d "dist" ]; then
            echo "dist folder missing"
            exit 1
          fi
          zip -r dist.zip dist

      - name: Delete previous "latest" release (if exists)
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Auto-generated build from latest commit
          files: dist.zip
          draft: false
          prerelease: false
